# CC-Codex Debate Review configuration
max_rounds: 10
# All agent invocations use full access (yolo mode).
# Both review and code-application steps need unrestricted access
# so agents can freely explore the repo, run tests, and apply fixes.
codex_sandbox: danger-full-access
# Language for LLM-generated output (issue messages, reasons, descriptions).
# Passed to Codex prompts via {OUTPUT_LANGUAGE}. CLI templates are always English.
language: en
# Agent invocation mode.
#   legacy:     Independent agent per step (build-context + template substitution)
#   persistent: Long-lived agents with SendMessage/resume (append-only prompt)
# Note: CC runtime commands are environment-specific and must be provided via
# config or ~/.claude/debate-review-config.yml under orchestrator.agents.cc.*.
agent_mode: persistent
